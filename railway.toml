[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Railway config-as-code covers build/deploy knobs.
# Service variables are configured in Railway dashboard (or via Railway CLI):
# - OPENCLAW_GATEWAY_PORT=8080
# - OPENCLAW_GATEWAY_TOKEN=<secret>
# - OPENCLAW_STATE_DIR=/data/.openclaw
# - OPENCLAW_WORKSPACE_DIR=/data/workspace
# - OPENCLAW_CONFIG_PATH=/data/.openclaw/openclaw.json
# - OPENCLAW_PLUGIN_STAGE_DIR=/data/plugin-runtime-deps
# - OPENCLAW_DISABLE_BONJOUR=1
# - TAILSCALE_AUTHKEY=<optional>
# - TAILSCALE_HOSTNAME=<optional>
